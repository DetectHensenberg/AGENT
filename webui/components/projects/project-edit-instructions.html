<html>

<head>
    <title>项目指令</title>
    <script type="module">
        import { store } from "/components/projects/projects-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.projects && $store.projects.selectedProject">
            <div>
                <!-- <div class="project-detail-header">
                        <div class="projects-project-card-title">Project details</div>
                        <div class="project-path" x-text="$store.projects.selectedProject.path"></div>
                    </div> -->

                <div class="projects-form-group">
                    <label class="projects-form-label">描述</label>
                    <span class="projects-form-description">描述项目。这有助于您和代理理解项目上下文。</span>
                    <textarea class="projects-form-textarea" x-model="$store.projects.selectedProject.description"
                        rows="5" placeholder="输入项目描述"></textarea>
                </div>

                <div class="projects-form-group">
                    <label class="projects-form-label">指令</label>
                    <span class="projects-form-description">为代理提供与此项目相关的具体指令。</span>
                    <textarea class="projects-form-textarea"
                        x-model="$store.projects.selectedProject.instructions" rows="15"
                        placeholder="输入项目指令"></textarea>
                </div>

                <div class="projects-form-group">
                    <label class="projects-form-label">指令文件</label>
                    <div class="projects-input-with-button-wrapper">
                        <span class="projects-form-description">额外的指令文件位于 <strong><span
                                    x-text="$store.projects.getSelectedAbsPath('.a0proj','instructions')"></span></strong>。目前仅支持文本文件（txt、md、yaml，不支持 PDF 或图片）。</span>
                        <span class="projects-form-description">目前有 <strong><span
                                    x-text="$store.projects.selectedProject.instruction_files_count || 0"></span></strong> 个指令文件。</span>
                        <button class="button icon-button" x-on:click="$store.projects.browseInstructionFiles()">
                            <span class="icon material-symbols-outlined">folder</span>
                            <span>浏览</span>
                        </button>
                    </div>
                </div>
            </div>


        </template>
    </div>
</body>
<style>
</style>

</html>
