<html>

<head>
    <title>创建新项目</title>
    <script type="module">
        import { store } from "/components/projects/projects-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.projects && $store.projects.selectedProject">
            <div>
                <div class="project-detail">

                    <x-component path="projects/project-edit-basic-data.html">
                    </x-component>

                    <div class="projects-form-group">
                        <label class="projects-form-label">Git 仓库（可选）</label>
                        <span class="projects-form-description">从现有的 Git 仓库克隆。留空则创建空项目。</span>
                        <input class="projects-form-input" type="text" 
                            x-model="$store.projects.selectedProject.git_url"
                            :disabled="$store.projects.selectedProject._cloning"
                            placeholder="https://github.com/user/repo.git">
                    </div>

                    <template x-if="$store.projects.selectedProject.git_url && $store.projects.selectedProject.git_url.trim()">
                        <div class="projects-form-group">
                            <label class="projects-form-label">访问令牌（可选）</label>
                            <span class="projects-form-description">用于私有仓库。令牌仅用于克隆，不会被存储。</span>
                            <input class="projects-form-input" type="password" 
                                x-model="$store.projects.selectedProject.git_token"
                                :disabled="$store.projects.selectedProject._cloning"
                                placeholder="ghp_xxxx or glpat-xxxx">
                        </div>
                    </template>

                    <div class="buttons-right">
                        <button type="button" class="button cancel"
                            @click="$store.projects.cancelCreate()"
                            :disabled="$store.projects.selectedProject._cloning">取消</button>
                        <button type="button" class="button confirm" 
                            @click="$store.projects.confirmCreate()"
                            :disabled="$store.projects.selectedProject._cloning">
                            <template x-if="$store.projects.selectedProject._cloning">
                                <span class="button-loading">
                                    <span class="spinner"></span>
                                    <span>克隆中...</span>
                                </span>
                            </template>
                            <template x-if="!$store.projects.selectedProject._cloning">
                                <span x-text="$store.projects.selectedProject.git_url ? '克隆并继续' : '创建并继续'"></span>
                            </template>
                        </button>
                    </div>
                </div>


            </div>
        </template>
    </div>
</body>
<style>
    .project-detail {
        border: 1px solid var(--color-border);
        border-radius: 0.5em;
        padding: 1em;
        margin: 1em;
        background: var(--color-panel);
    }

    .project-detail-header {
        margin-bottom: 1em;
    }

    .button-loading {
        display: inline-flex;
        align-items: center;
        gap: 0.5em;
    }

    .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top: 2px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
</style>

</html>
