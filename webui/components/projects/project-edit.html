<html>

<head>
    <title>编辑项目</title>
    <script type="module">
        import { store } from "/components/projects/projects-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.projects && $store.projects.selectedProject">
            <div>


                <div class="buttons-container" style="margin: var(--spacing-md) var(--spacing-sm) var(--spacing-lg) var(--spacing-sm);">
                    <div class="buttons-left">
                        <button type="button" class="button cancel"
                            @click="$confirmClick($event, () => $store.projects.deleteProjectAndCloseModal())">删除</button>
                    </div>
                    <div class="buttons-right">
                        <button type="button" class="button cancel"
                            @click="$store.projects.cancelEdit()">取消</button>
                        <button type="button" class="button confirm"
                            @click="$store.projects.confirmEdit()">保存</button>
                    </div>
                </div>

                <div class="project-detail">
                    <div class="project-detail-header">
                        <span class="projects-project-card-title">基本信息</span>
                    </div>
                    <x-component path="projects/project-edit-basic-data.html">
                    </x-component>
                </div>

                <div class="project-detail">
                    <div class="project-detail-header">
                        <span class="projects-project-card-title">指令</span>
                    </div>
                    <x-component path="projects/project-edit-instructions.html">
                    </x-component>
                </div>

                <div class="project-detail">
                    <div class="project-detail-header">
                        <span class="projects-project-card-title">记忆</span>
                    </div>
                    <x-component path="projects/project-edit-memory.html">
                    </x-component>
                </div>

                <div class="project-detail">
                    <div class="project-detail-header">
                        <span class="projects-project-card-title">文件结构</span>
                    </div>
                    <x-component path="projects/project-edit-file-structure.html">
                    </x-component>
                </div>

                <div class="project-detail">
                    <div class="project-detail-header">
                        <span class="projects-project-card-title">密钥</span>
                    </div>
                    <x-component path="projects/project-edit-secrets.html">
                    </x-component>
                </div>

                <div class="project-detail">
                    <div class="project-detail-header">
                        <span class="projects-project-card-title">技能</span>
                    </div>
                    <x-component path="projects/project-edit-skills.html">
                    </x-component>
                </div>

                <div class="buttons-container" style="margin: var(--spacing-md) var(--spacing-sm) var(--spacing-lg) var(--spacing-sm);">
                    <div class="buttons-left">
                        <button type="button" class="button cancel"
                            @click="$confirmClick($event, () => $store.projects.deleteProjectAndCloseModal())">删除</button>
                    </div>
                    <div class="buttons-right">
                        <button type="button" class="button cancel"
                            @click="$store.projects.cancelEdit()">取消</button>
                        <button type="button" class="button confirm"
                            @click="$store.projects.confirmEdit()">保存</button>
                    </div>
                </div>


            </div>
        </template>
    </div>
</body>
<style>
    .project-detail {
        border: 1px solid var(--color-border);
        border-radius: 0.5em;
        padding: 1em;
        margin: 1em;
        background: var(--color-panel);
    }

    .project-detail-header {
        margin-bottom: 1em;
    }
</style>

</html>
