<html>
<head>
  <title>技能选择</title>
  <script type="module">
    import { store } from "/components/modals/skills/skills-store.js";
  </script>
</head>
<body>
  <div class="skills-modal" x-data>
    <template x-if="$store.skills">
      <div class="skills-container">
        <!-- Search Bar -->
        <div class="skills-search">
          <input 
            type="text" 
            placeholder="搜索技能..." 
            @input="$store.skills.search($event.target.value)"
            class="skills-search-input"
          />
          <span class="skills-count" x-text="`${$store.skills.skillsData?.count || 0} 个技能`"></span>
        </div>

        <!-- Selected Skills -->
        <template x-if="$store.skills.selectedSkills.length > 0">
          <div class="skills-selected">
            <div class="skills-selected-header">
              <span>已选择 <strong x-text="$store.skills.selectedSkills.length"></strong> 个技能</span>
              <button class="skills-clear-btn" @click="$store.skills.clearSelection()">清除</button>
            </div>
            <div class="skills-selected-tags">
              <template x-for="skill in $store.skills.selectedSkills" :key="skill.name">
                <span class="skill-tag" @click="$store.skills.toggleSkill(skill)">
                  <span x-text="skill.name"></span>
                  <span class="skill-tag-remove">×</span>
                </span>
              </template>
            </div>
          </div>
        </template>

        <!-- Loading State -->
        <template x-if="$store.skills.isLoading">
          <div class="skills-loading">
            <div class="spinner"></div>
            <span>加载技能列表...</span>
          </div>
        </template>

        <!-- Error State -->
        <template x-if="$store.skills.error">
          <div class="skills-error">
            <span class="material-symbols-outlined">error</span>
            <span x-text="$store.skills.error"></span>
          </div>
        </template>

        <!-- Skills List -->
        <div class="skills-list" x-show="!$store.skills.isLoading && !$store.skills.error && $store.skills.skillsData">
          <template x-for="(skill, index) in ($store.skills.skillsData?.items || [])" :key="index">
            <div 
              class="skill-item" 
              :class="{'selected': $store.skills.isSelected(skill)}"
              @click="$store.skills.toggleSkill(skill)"
            >
              <div class="skill-checkbox">
                <span class="material-symbols-outlined" x-text="$store.skills.isSelected(skill) ? 'check_box' : 'check_box_outline_blank'"></span>
              </div>
              <div class="skill-info">
                <div class="skill-name" x-text="skill.name"></div>
                <div class="skill-desc" x-text="skill.description"></div>
              </div>
              <div class="skill-source" x-text="skill.source || ''"></div>
            </div>
          </template>
        </div>

        <!-- Action Buttons -->
        <div class="skills-actions">
          <button class="skills-btn skills-btn-secondary" @click="window.closeModal()">取消</button>
          <button 
            class="skills-btn skills-btn-primary" 
            @click="$store.skills.applySkills()"
            :disabled="$store.skills.selectedSkills.length === 0"
          >
            <span>应用技能</span>
            <template x-if="$store.skills.selectedSkills.length > 0">
              <span x-text="`(${$store.skills.selectedSkills.length})`"></span>
            </template>
          </button>
        </div>
      </div>
    </template>
  </div>

  <style>
    .skills-modal {
      width: 100%;
      height: 100%;
      min-height: 500px;
      display: flex;
      flex-direction: column;
    }

    .skills-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 450px;
      gap: var(--spacing-sm);
    }

    .skills-search {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm);
      background: var(--color-background);
      border-radius: 8px;
    }

    .skills-search-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--color-panel);
      color: var(--color-text);
      font-size: 14px;
    }

    .skills-search-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .skills-count {
      font-size: 12px;
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    .skills-selected {
      padding: var(--spacing-sm);
      background: var(--color-background);
      border-radius: 8px;
    }

    .skills-selected-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-xs);
      font-size: 12px;
      color: var(--color-text-muted);
    }

    .skills-clear-btn {
      background: none;
      border: none;
      color: var(--color-primary);
      cursor: pointer;
      font-size: 12px;
    }

    .skills-selected-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .skill-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: var(--color-primary);
      color: white;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    .skill-tag-remove {
      font-size: 14px;
      opacity: 0.8;
    }

    .skills-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-right: 4px;
      min-height: 200px;
      max-height: 400px;
    }

    .skill-item {
      display: flex;
      align-items: flex-start;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm);
      background: var(--color-background);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .skill-item:hover {
      background: var(--color-background-hover);
    }

    .skill-item.selected {
      border-color: var(--color-primary);
      background: rgba(var(--color-primary-rgb), 0.1);
    }

    .skill-checkbox {
      flex-shrink: 0;
      color: var(--color-text-muted);
    }

    .skill-item.selected .skill-checkbox {
      color: var(--color-primary);
    }

    .skill-checkbox .material-symbols-outlined {
      font-size: 20px;
    }

    .skill-info {
      flex: 1;
      min-width: 0;
    }

    .skill-name {
      font-weight: 500;
      font-size: 14px;
      color: var(--color-text);
      margin-bottom: 2px;
    }

    .skill-desc {
      font-size: 12px;
      color: var(--color-text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .skill-tags {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }

    .skill-tag-small {
      padding: 2px 6px;
      background: var(--color-panel);
      border-radius: 3px;
      font-size: 10px;
      color: var(--color-text-muted);
    }

    .skill-source {
      font-size: 10px;
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    .skills-loading, .skills-error, .skills-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      color: var(--color-text-muted);
      gap: var(--spacing-sm);
    }

    .skills-error {
      color: var(--color-error, #ff4444);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .skills-actions {
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-sm);
      padding-top: var(--spacing-sm);
      border-top: 1px solid var(--color-border);
    }

    .skills-btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .skills-btn-secondary {
      background: var(--color-background);
      border: 1px solid var(--color-border);
      color: var(--color-text);
    }

    .skills-btn-secondary:hover {
      background: var(--color-background-hover);
    }

    .skills-btn-primary {
      background: var(--color-primary);
      border: none;
      color: white;
    }

    .skills-btn-primary:hover:not(:disabled) {
      opacity: 0.9;
    }

    .skills-btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</body>
</html>
