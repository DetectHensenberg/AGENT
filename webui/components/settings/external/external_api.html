  <head>
    <title>外部 API</title>
  </head>

  <body>
    <div x-data>

        <div class="field">
          <div class="field-label">

            </div>
          </div>
          <div class="field-control">
            <button

              @click="$store.settings.handleFieldButton({ id: 'external_api_examples' })"

              查看 API 示例
            </button>
          </div>
        </div>
      </div>
    </div>
