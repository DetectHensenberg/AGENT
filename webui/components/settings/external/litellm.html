<html>
  <head>
    <title>LiteLLM</title>
  </head>

  <body>
    <div x-data="{ get settings() { return $store.settings.settings } }">
      <template x-if="settings">
        <div>
          <div class="section-title">LiteLLM 全局设置</div>
          <div class="section-description">
            配置传递给所有提供商的 LiteLLM 全局参数。
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">LiteLLM 全局参数</div>
              <div class="field-description">
                LiteLLM 全局参数（如 timeout, stream_timeout），格式为 .env：每行一个 KEY=VALUE。示例：<code>stream_timeout=30</code>。除非被覆盖，否则应用于所有 LiteLLM 调用。参见 <a href='https://docs.litellm.ai/docs/set_keys' target='_blank'>LiteLLM</a> 和 <a href='https://docs.litellm.ai/docs/proxy/timeout' target='_blank'>超时设置</a>。
              </div>
            </div>
            <div class="field-control">
              <textarea style="height: 12em" x-model="settings.litellm_global_kwargs"></textarea>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
