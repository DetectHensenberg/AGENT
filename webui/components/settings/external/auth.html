<html>
  <head>
    <title>身份验证</title>
  </head>

  <body>
    <div
      x-data="{
        get settings() { return $store.settings.settings },
        get additional() { return $store.settings.additional || {} }
      }"
    >
      <template x-if="settings">
        <div>
          <div class="section-title">身份验证</div>
          <div class="section-description">
            使用 Agent Zero Web UI 的身份验证设置。
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">UI 登录名</div>
              <div class="field-description">设置 Web UI 的用户名</div>
            </div>
            <div class="field-control">
              <input type="text" x-model="settings.auth_login" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">UI 密码</div>
              <div class="field-description">设置 Web UI 的用户密码</div>
            </div>
            <div class="field-control">
              <input type="password" autocomplete="off" x-model="settings.auth_password" />
            </div>
          </div>

          <template x-if="additional.is_dockerized">
            <div class="field">
              <div class="field-label">
                <div class="field-title">root 密码</div>
                <div class="field-description">
                  更改 Docker 容器中的 Linux root 密码。此密码可用于 SSH 访问。原始密码在设置时随机生成。
                </div>
              </div>
              <div class="field-control">
                <input type="password" autocomplete="off" x-model="settings.root_password" />
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </body>
</html>
