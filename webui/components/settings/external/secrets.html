<html>
  <head>
    <title>密钥管理</title>
  </head>

  <body>
    <div x-data="{ get settings() { return $store.settings.settings } }">
      <template x-if="settings">
        <div>
          <div class="section-title">密钥管理</div>
          <div class="section-description">
            管理代理可以使用的密钥和凭据，而不会将值暴露给 LLM、聊天历史或日志。占位符会在工具调用前自动替换为实际值。如果工具结果中出现裸密码，它们会被掩码回占位符。
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">变量存储</div>
              <div class="field-description">
                以 .env 格式存储非敏感变量，如 EMAIL_IMAP_SERVER="imap.gmail.com"，每行一个。可以使用 # 开头的注释为代理添加描述。参见<a href="javascript:openModal('settings/secrets/example-vars.html')">示例</a>。<br>这些变量对 LLM 和聊天历史可见，不会被掩码。
              </div>
            </div>
            <div class="field-control">
              <textarea style="height: 20em" x-model="settings.variables"></textarea>
            </div>
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">密钥存储</div>
              <div class="field-description">
                以 .env 格式存储密钥和凭据，如 EMAIL_PASSWORD="s3cret-p4$$w0rd"，每行一个。可以使用 # 开头的注释为代理添加描述。参见<a href="javascript:openModal('settings/secrets/example-secrets.html')">示例</a>。<br>这些变量对 LLM 和聊天历史不可见，会被掩码。⚠️ 仅长度 >= 4 的值会被掩码以防止误报。
              </div>
            </div>
            <div class="field-control">
              <textarea style="height: 20em" x-model="settings.secrets"></textarea>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
