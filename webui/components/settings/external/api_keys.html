<html>
  <head>
    <title>API 密钥</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">API 密钥</div>
          <div class="section-description">
            Agent Zero 使用的模型提供商和服务的 API 密钥。您可以设置多个 API 密钥，用逗号 (,) 分隔。它们将以轮询方式使用。<br>
            有关 Agent Zero Venice 提供商的更多信息，请参见 <a href="http://agent-zero.ai/?community/api-dashboard/about" target="_blank">Agent Zero Venice</a>。
          </div>

          <template x-for="provider in $store.settings.apiKeyProviders" :key="provider.value">
            <div class="field">
              <div class="field-label">
                <div class="field-title" x-text="provider.label"></div>
              </div>
              <div class="field-control">
                <input
                  type="text"
                  x-model="$store.settings.settings.api_keys[provider.value]"
                  autocomplete="off"
                />
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </body>
</html>
