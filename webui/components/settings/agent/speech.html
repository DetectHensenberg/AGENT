<html>
  <head>
    <title>语音</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">语音</div>
          <div class="section-description">
            语音转录和语音合成设置。
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">麦克风设备</div>
              <div class="field-description">选择用于语音转文字的麦克风设备。</div>
            </div>
            <div class="field-control">
              <x-component path="/settings/speech/microphone.html"></x-component>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">语音转文字模型大小</div>
              <div class="field-description">选择语音转文字模型大小</div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.stt_model_size">
                <template x-for="option in $store.settings.additional?.stt_models" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.stt_model_size" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">语音转文字语言代码</div>
              <div class="field-description">语言代码（如 en, fr, zh）</div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.stt_language" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">麦克风静音阈值</div>
              <div class="field-description">静音检测阈值。较低的值对噪音更敏感。</div>
            </div>
            <div class="field-control">
              <input type="range" min="0" max="1" step="0.01" x-model.number="$store.settings.settings.stt_silence_threshold" />
              <span class="range-value" x-text="$store.settings.settings.stt_silence_threshold"></span>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">麦克风静音时长 (ms)</div>
              <div class="field-description">系统认为说话结束前的静音时长。</div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.stt_silence_duration" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">麦克风等待超时 (ms)</div>
              <div class="field-description">系统关闭麦克风前的静音时长。</div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.stt_waiting_timeout" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">启用 Kokoro TTS</div>
              <div class="field-description">
                启用更高质量的服务端 AI（Kokoro）代替基于浏览器的文字转语音。
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.tts_kokoro" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
