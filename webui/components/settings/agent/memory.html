<html>
  <head>
    <title>记忆</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">记忆</div>
          <div class="section-description">
            A0 记忆系统配置。A0 会自动记忆和回忆，以帮助其上下文感知。
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">记忆子目录</div>
              <div class="field-description">
                /memory 文件夹的子目录，用于代理记忆存储。用于分离不同实例之间的记忆存储。
              </div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.agent_memory_subdir" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">记忆仪表盘</div>
              <div class="field-description">
                以表格格式查看和探索所有存储的记忆，支持筛选和搜索。
              </div>
            </div>
            <div class="field-control">
              <button
                class="btn btn-field"
                @click="openModal('modals/memory/memory-dashboard.html');"
              >
                打开仪表盘
              </button>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">启用记忆自动回忆</div>
              <div class="field-description">Agent Zero 将根据对话上下文自动回忆记忆。</div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.memory_recall_enabled" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">记忆自动回忆延迟</div>
              <div class="field-description">
                代理不会等待自动记忆回忆。记忆将在下一条消息中传递。这会加快代理的响应时间，但可能导致第一步的相关性较差。
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.memory_recall_delayed" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">自动回忆 AI 查询准备</div>
              <div class="field-description">
                启用工具 LLM 从对话上下文准备向量数据库查询以进行自动回忆。提高搜索质量，每次自动回忆增加 1 次工具 LLM 调用。
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.memory_recall_query_prep" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">自动回忆 AI 后置过滤</div>
              <div class="field-description">
                启用工具 LLM 对自动回忆进行记忆相关性过滤。提高搜索质量，每次自动回忆增加 1 次工具 LLM 调用。
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.memory_recall_post_filter" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">记忆自动回忆间隔</div>
              <div class="field-description">
                每次用户或上级代理发消息后会回忆记忆。在代理独白期间，根据此参数每 X 轮回忆一次。
              </div>
            </div>
            <div class="field-control">
              <input type="range" min="1" max="10" step="1" x-model.number="$store.settings.settings.memory_recall_interval" />
              <span class="range-value" x-text="$store.settings.settings.memory_recall_interval"></span>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">记忆自动回忆历史长度</div>
              <div class="field-description">
                传递给记忆回忆 LLM 的对话历史长度（字符数）。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.memory_recall_history_len" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">记忆自动回忆相似度阈值</div>
              <div class="field-description">
                记忆回忆中相似性搜索的阈值（0 = 无相似性，1 = 完全匹配）。
              </div>
            </div>
            <div class="field-control">
              <input type="range" min="0" max="1" step="0.01" x-model.number="$store.settings.settings.memory_recall_similarity_threshold" />
              <span class="range-value" x-text="$store.settings.settings.memory_recall_similarity_threshold"></span>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">自动回忆最大搜索记忆数</div>
              <div class="field-description">
                向量数据库返回的用于进一步处理的最大记忆数。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.memory_recall_memories_max_search" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">自动回忆最大使用记忆数</div>
              <div class="field-description">
                注入 A0 上下文窗口的最大记忆数。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.memory_recall_memories_max_result" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">自动回忆最大搜索方案数</div>
              <div class="field-description">
                向量数据库返回的用于进一步处理的最大方案数。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.memory_recall_solutions_max_search" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">自动回忆最大使用方案数</div>
              <div class="field-description">
                注入 A0 上下文窗口的最大方案数。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.memory_recall_solutions_max_result" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">启用自动记忆</div>
              <div class="field-description">
                A0 将自动从对话历史中记忆事实和解决方案。
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.memory_memorize_enabled" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">自动记忆 AI 整合</div>
              <div class="field-description">
                A0 将使用工具 LLM 自动整合相似记忆。随时间提高记忆质量，每条记忆增加 2 次工具 LLM 调用。
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.memory_memorize_consolidation" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">自动记忆替换阈值</div>
              <div class="field-description">
                仅在 AI 整合禁用时适用。根据此阈值用新记忆替换之前的相似记忆。0 = 即使完全不相似也替换，1 = 仅完全匹配时替换。
              </div>
            </div>
            <div class="field-control">
              <input type="range" min="0" max="1" step="0.01" x-model.number="$store.settings.settings.memory_memorize_replace_threshold" />
              <span class="range-value" x-text="$store.settings.settings.memory_memorize_replace_threshold"></span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
