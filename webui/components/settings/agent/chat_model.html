<html>
  <head>
    <title>聊天模型</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">聊天模型</div>
          <div class="section-description">
            Agent Zero 使用的主聊天模型的选择和设置
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">聊天模型提供商</div>
              <div class="field-description">选择 Agent Zero 使用的主聊天模型提供商</div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.chat_model_provider">
                <template x-for="option in $store.settings.additional?.chat_providers" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.chat_model_provider" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">聊天模型名称</div>
              <div class="field-description">所选提供商的确切模型名称</div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.chat_model_name" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">API 密钥</div>
              <div class="field-description">所选聊天模型提供商的 API 密钥</div>
            </div>
            <div class="field-control">
              <input
                type="text"
                x-model="$store.settings.settings.api_keys[$store.settings.settings.chat_model_provider]"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">聊天模型 API 基础 URL</div>
              <div class="field-description">
                主聊天模型的 API 基础 URL。留空则使用默认值。仅对 Azure、本地和自定义（其他）提供商有效。
              </div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.chat_model_api_base" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">聊天模型上下文长度</div>
              <div class="field-description">
                LLM 上下文窗口的最大 token 数。系统提示词、聊天历史、RAG 和响应都会计入此限制。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.chat_model_ctx_length" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">聊天历史的上下文窗口空间</div>
              <div class="field-description">
                分配给代理可见聊天历史的上下文窗口比例。聊天历史会自动优化以适应。较小的值会导致历史更短且更概括。剩余空间将用于系统提示词、RAG 和响应。
              </div>
            </div>
            <div class="field-control">
              <input
                type="range"
                min="0.01"
                max="1"
                step="0.01"
                x-model.number="$store.settings.settings.chat_model_ctx_history"
              />
              <span class="range-value" x-text="$store.settings.settings.chat_model_ctx_history"></span>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">支持视觉</div>
              <div class="field-description">
                支持视觉的模型可以原生查看图片附件的内容。
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.chat_model_vision" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">每分钟请求数限制</div>
              <div class="field-description">
                限制每分钟对聊天模型的请求数。超过限制时会等待。设为 0 可禁用速率限制。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.chat_model_rl_requests" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">每分钟输入 token 数限制</div>
              <div class="field-description">
                限制每分钟对聊天模型的输入 token 数。超过限制时会等待。设为 0 可禁用速率限制。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.chat_model_rl_input" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">每分钟输出 token 数限制</div>
              <div class="field-description">
                限制每分钟对聊天模型的输出 token 数。超过限制时会等待。设为 0 可禁用速率限制。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.chat_model_rl_output" />
            </div>
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">聊天模型附加参数</div>
              <div class="field-description">
                <a href='https://docs.litellm.ai/docs/set_keys' target='_blank'>LiteLLM</a> 支持的其他参数。格式为每行 KEY=VALUE，类似 .env 文件。值也可以包含 JSON 对象 - 未加引号时视为对象、数字等，加引号时视为字符串。
              </div>
            </div>
            <div class="field-control">
              <textarea x-model="$store.settings.settings.chat_model_kwargs"></textarea>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
