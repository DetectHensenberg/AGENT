<html>
  <head>
    <title>工具模型</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">工具模型</div>
          <div class="section-description">
            更小、更便宜、更快的模型，用于处理工具任务，如组织记忆、准备提示词、摘要等。
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">工具模型提供商</div>
              <div class="field-description">选择框架使用的工具模型提供商</div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.util_model_provider">
                <template x-for="option in $store.settings.additional?.chat_providers" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.util_model_provider" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">工具模型名称</div>
              <div class="field-description">所选提供商的确切模型名称</div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.util_model_name" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">API 密钥</div>
              <div class="field-description">所选工具模型提供商的 API 密钥</div>
            </div>
            <div class="field-control">
              <input
                type="text"
                x-model="$store.settings.settings.api_keys[$store.settings.settings.util_model_provider]"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">工具模型 API 基础 URL</div>
              <div class="field-description">
                工具模型的 API 基础 URL。留空则使用默认值。仅对 Azure、本地和自定义（其他）提供商有效。
              </div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.util_model_api_base" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">每分钟请求数限制</div>
              <div class="field-description">
                限制每分钟对工具模型的请求数。超过限制时会等待。设为 0 可禁用速率限制。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.util_model_rl_requests" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">每分钟输入 token 数限制</div>
              <div class="field-description">
                限制每分钟对工具模型的输入 token 数。超过限制时会等待。设为 0 可禁用速率限制。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.util_model_rl_input" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">每分钟输出 token 数限制</div>
              <div class="field-description">
                限制每分钟对工具模型的输出 token 数。超过限制时会等待。设为 0 可禁用速率限制。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.util_model_rl_output" />
            </div>
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">工具模型附加参数</div>
              <div class="field-description">
                <a href='https://docs.litellm.ai/docs/set_keys' target='_blank'>LiteLLM</a> 支持的其他参数。格式为每行 KEY=VALUE，类似 .env 文件。值也可以包含 JSON 对象 - 未加引号时视为对象、数字等，加引号时视为字符串。
              </div>
            </div>
            <div class="field-control">
              <textarea x-model="$store.settings.settings.util_model_kwargs"></textarea>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
