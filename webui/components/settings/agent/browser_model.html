<html>
  <head>
    <title>浏览器模型</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">浏览器模型</div>
          <div class="section-description">
            浏览器模型设置。Agent Zero 使用 <a href='https://github.com/browser-use/browser-use' target='_blank'>browser-use</a> 代理框架来处理网页交互。
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">浏览器模型提供商</div>
              <div class="field-description">选择 Agent Zero 使用的浏览器模型提供商</div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.browser_model_provider">
                <template x-for="option in $store.settings.additional?.chat_providers" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.browser_model_provider" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">浏览器模型名称</div>
              <div class="field-description">所选提供商的确切模型名称</div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.browser_model_name" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">API 密钥</div>
              <div class="field-description">所选浏览器模型提供商的 API 密钥</div>
            </div>
            <div class="field-control">
              <input
                type="text"
                x-model="$store.settings.settings.api_keys[$store.settings.settings.browser_model_provider]"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">浏览器模型 API 基础 URL</div>
              <div class="field-description">
                浏览器模型的 API 基础 URL。留空则使用默认值。仅对 Azure、本地和自定义（其他）提供商有效。
              </div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.browser_model_api_base" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">支持视觉</div>
              <div class="field-description">
                支持视觉的模型可以原生查看图片附件的内容。
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.browser_model_vision" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">每分钟请求数限制</div>
              <div class="field-description">
                限制每分钟对浏览器模型的请求数。超过限制时会等待。设为 0 可禁用速率限制。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.browser_model_rl_requests" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">每分钟输入 token 数限制</div>
              <div class="field-description">
                限制每分钟对浏览器模型的输入 token 数。超过限制时会等待。设为 0 可禁用速率限制。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.browser_model_rl_input" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">每分钟输出 token 数限制</div>
              <div class="field-description">
                限制每分钟对浏览器模型的输出 token 数。超过限制时会等待。设为 0 可禁用速率限制。
              </div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.browser_model_rl_output" />
            </div>
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">浏览器模型附加参数</div>
              <div class="field-description">
                <a href='https://docs.litellm.ai/docs/set_keys' target='_blank'>LiteLLM</a> 支持的其他参数。格式为每行 KEY=VALUE，类似 .env 文件。
              </div>
            </div>
            <div class="field-control">
              <textarea x-model="$store.settings.settings.browser_model_kwargs"></textarea>
            </div>
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">浏览器 HTTP 头</div>
              <div class="field-description">
                网页浏览调用的默认 HTTP 头，格式为 KEY=VALUE (.env)。
              </div>
            </div>
            <div class="field-control">
              <textarea x-model="$store.settings.settings.browser_http_headers"></textarea>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
