<html>
  <head>
    <title>备份与恢复</title>
  </head>

  <body>
    <div x-data>
      <div>
        <div class="section-title">备份与恢复</div>
        <div class="section-description">
          使用基于 glob 模式的文件选择来备份和恢复 Agent Zero 数据和配置。
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">创建备份</div>
            <div class="field-description">
              使用可自定义模式创建所选文件和配置的备份存档。
            </div>
          </div>
          <div class="field-control">
            <button
              class="btn btn-field"
              @click="$store.settings.handleFieldButton({ id: 'backup_create' })"
            >
              创建备份
            </button>
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">从备份恢复</div>
            <div class="field-description">
              使用基于模式的选择从备份存档恢复文件和配置。
            </div>
          </div>
          <div class="field-control">
            <button
              class="btn btn-field"
              @click="$store.settings.handleFieldButton({ id: 'backup_restore' })"
            >
              恢复备份
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
