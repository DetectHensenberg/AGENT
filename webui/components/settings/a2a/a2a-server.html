<html>
  <head>
    <title>A0 A2A 服务器</title>
  </head>

  <body>
    <div x-data="{ get settings() { return $store.settings.settings } }">
      <template x-if="settings">
        <div>
          <div class="section-title">A0 A2A 服务器</div>
          <div class="section-description">
            Agent Zero 可以作为 A2A 服务器暴露。参见<a href="javascript:openModal('settings/a2a/a2a-connection.html')">连接示例</a>。
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">启用 A2A 服务器</div>
              <div class="field-description">
                将 Agent Zero 作为 A2A 服务器暴露。这允许其他代理通过 A2A 协议连接到 A0。
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="settings.a2a_server_enabled" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
