<html>
  <head>
    <title>开发</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">开发</div>
          <div class="section-description">
            A0 框架开发参数。RFC（远程函数调用）用于在另一个 A0 实例上调用函数。您可以在本地系统上原生开发和调试 A0，同时将某些函数重定向到 Docker 中的 A0 实例。这对开发至关重要，因为 A0 需要在标准化环境中运行以支持所有功能。
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Shell 接口</div>
              <div class="field-description">
                代码执行工具使用的终端接口。本地 Python TTY 在 Docker 化和开发环境中都可本地工作。SSH 始终连接到 Docker 化环境（自动使用 localhost 或 RFC 主机地址）。
              </div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.shell_interface">
                <template x-for="option in $store.settings.additional?.shell_interfaces" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.shell_interface" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <template x-if="!$store.settings.additional?.is_dockerized">
            <div>
              <div class="field">
                <div class="field-label">
                  <div class="field-title">RFC 目标 URL</div>
                  <div class="field-description">
                    用于远程函数调用的 Docker 化 A0 实例 URL。请勿在此处指定端口。
                  </div>
                </div>
                <div class="field-control">
                  <input type="text" x-model="$store.settings.settings.rfc_url" />
                </div>
              </div>
            </div>
          </template>

          <div class="field">
            <div class="field-label">
              <div class="field-title">RFC 密码</div>
              <div class="field-description">
                远程函数调用的密码。两个实例的密码必须匹配。空密码无法使用 RFC。
              </div>
            </div>
            <div class="field-control">
              <input type="password" autocomplete="off" x-model="$store.settings.settings.rfc_password" />
            </div>
          </div>

          <template x-if="!$store.settings.additional?.is_dockerized">
            <div>
              <div class="field">
                <div class="field-label">
                  <div class="field-title">RFC HTTP 端口</div>
                  <div class="field-description">Docker 化 A0 实例的 HTTP 端口。</div>
                </div>
                <div class="field-control">
                  <input type="number" x-model.number="$store.settings.settings.rfc_port_http" />
                </div>
              </div>

              <div class="field">
                <div class="field-label">
                  <div class="field-title">RFC SSH 端口</div>
                  <div class="field-description">Docker 化 A0 实例的 SSH 端口。</div>
                </div>
                <div class="field-control">
                  <input type="number" x-model.number="$store.settings.settings.rfc_port_ssh" />
                </div>
              </div>
            </div>
          </template>

          <div class="field">
            <div class="field-label">
              <div class="field-title">广播服务器重启事件</div>
              <div class="field-description">
                服务器启动后向客户端发送即发即忘的 <code>server_restart</code> 广播。
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.websocket_server_restart_enabled" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">启用 uvicorn 访问日志</div>
              <div class="field-description">
                临时启用 uvicorn 访问日志以调试 WebSocket 传输问题（默认关闭）。
              </div>
              <template
                x-if="$store.settings.additional?.runtime_settings &&
                  $store.settings.settings?.uvicorn_access_logs_enabled !==
                    $store.settings.additional.runtime_settings.uvicorn_access_logs_enabled"
              >
                <div class="field-description">
                  后端重启后生效。
                </div>
              </template>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.uvicorn_access_logs_enabled" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <template x-if="!$store.settings.additional?.is_dockerized">
            <div>
              <div class="section-title">测试</div>
              <div class="section-description">
                用于在开发环境中验证 WebSocket 基础设施的工具。
              </div>

              <div class="field">
                <div class="field-label">
                  <div class="field-title">WebSocket 测试工具</div>
                  <div class="field-description">
                    打开开发者工具以运行自动化和手动 WebSocket 验证套件。
                  </div>
                </div>
                <div class="field-control">
                  <button
                    class="btn btn-field"
                    @click="openModal('settings/developer/websocket-tester.html');"
                  >
                    打开工具
                  </button>
                </div>
              </div>

              <div class="field">
                <div class="field-label">
                  <div class="field-title">WebSocket 事件控制台</div>
                  <div class="field-description">
                    实时检查入站和出站信封以及生命周期事件（仅开发环境）。
                  </div>
                </div>
                <div class="field-control">
                  <button
                    class="btn btn-field"
                    @click="openModal('settings/developer/websocket-event-console.html');"
                  >
                    打开控制台
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </body>
</html>
